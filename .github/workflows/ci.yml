name: CI Pipeline

on:
  pull_request:
    branches: [main, staging]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '10'

jobs:
  quality:
    name: Quality Checks
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm tsc --noEmit

      - name: Lint
        run: pnpm lint

  build:
    name: Production Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: quality

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build
        env:
          DATABASE_URL: ${{ secrets.TEST_DATABASE_URL }}
          DIRECT_URL: ${{ secrets.TEST_DIRECT_URL }}
          JWT_SECRET: "ci-build-secret"
          RESEND_API_KEY: "re_test_fake"
          PAYSTACK_SECRET_KEY: "sk_test_fake"
          CRON_SECRET: "ci-cron-secret"
          KV_REST_API_URL: "https://fake.upstash.io"
          KV_REST_API_TOKEN: "fake"

  migration-check:
    name: Migration Safety
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && github.base_ref == 'main' || github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check for pending migrations
        run: |
          # Generate migration SQL without applying
          pnpm drizzle-kit generate 2>&1 | tee migration-output.txt
          
          # If new migration files were generated, flag for review
          if git diff --name-only | grep -q "server/db/migrations"; then
            echo "⚠️ NEW MIGRATION DETECTED - Requires manual review"
            echo "::warning::New database migration detected. Review before merging."
            cat server/db/migrations/*.sql | tail -50
          fi
        env:
          DATABASE_URL: ${{ secrets.TEST_DATABASE_URL }}
          DIRECT_URL: ${{ secrets.TEST_DIRECT_URL }}
