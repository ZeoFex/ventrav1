<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>VentraPOS</title>
<style>
    :root {
        color-scheme: dark;
    }
    html, body {
        margin: 0;
        padding: 0;
        height: 100%;
        width: 100%;
        overflow: hidden;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
            "Helvetica Neue", Arial, sans-serif;
        color: rgba(255, 255, 255, 0.92);
        background: transparent;
        user-select: none;
        -webkit-user-select: none;
        cursor: default;
    }
    .shell {
        position: absolute;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 18px;
        padding: 32px 24px;
        box-sizing: border-box;
        background: radial-gradient(
                120% 120% at 50% -10%,
                rgba(16, 108, 80, 0.55) 0%,
                rgba(0, 53, 39, 0.98) 55%,
                rgba(3, 27, 20, 1) 100%
            ),
            #003527;
        border-radius: 18px;
        box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.06),
            0 24px 60px rgba(0, 0, 0, 0.35);
        -webkit-app-region: drag;
    }
    .logo-wrap {
        width: 128px;
        height: 128px;
        border-radius: 28px;
        background: #ffffff;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 12px 30px rgba(0, 0, 0, 0.35),
            inset 0 0 0 1px rgba(255, 255, 255, 0.08);
        overflow: hidden;
    }
    .logo-wrap img {
        width: 104px;
        height: 104px;
        object-fit: contain;
        display: block;
    }
    .wordmark {
        font-size: 22px;
        font-weight: 600;
        letter-spacing: 0.01em;
        margin: 6px 0 0;
    }
    .wordmark .accent {
        color: #5ee4b4;
    }
    .tagline {
        font-size: 12px;
        color: rgba(255, 255, 255, 0.6);
        margin: 0;
    }
    .spinner {
        width: 28px;
        height: 28px;
        margin-top: 6px;
        animation: spin 1s linear infinite;
    }
    .spinner circle {
        fill: none;
        stroke: rgba(255, 255, 255, 0.18);
        stroke-width: 3;
    }
    .spinner path {
        fill: none;
        stroke: #5ee4b4;
        stroke-width: 3;
        stroke-linecap: round;
    }
    @keyframes spin {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
    }
    #status {
        font-size: 12px;
        letter-spacing: 0.02em;
        color: rgba(255, 255, 255, 0.78);
        margin: 0;
        min-height: 16px;
        text-align: center;
    }
    .version {
        position: absolute;
        bottom: 14px;
        right: 18px;
        font-size: 10px;
        color: rgba(255, 255, 255, 0.35);
        letter-spacing: 0.06em;
        text-transform: uppercase;
    }
</style>
</head>
<body>
    <div class="shell">
        <div class="logo-wrap">
            <img src="build/splash-logo.png" alt="VentraPOS" />
        </div>
        <h1 class="wordmark">Ventra<span class="accent">POS</span></h1>
        <p class="tagline">Point of sale, built for speed.</p>
        <svg class="spinner" viewBox="0 0 36 36" aria-hidden="true">
            <circle cx="18" cy="18" r="14" />
            <path d="M18 4 a14 14 0 0 1 14 14" />
        </svg>
        <p id="status">Starting up&hellip;</p>
        <span class="version" id="version"></span>
    </div>
    <script>
        // Expose a tiny API so electron/main.js can push boot milestones.
        window.__splashStatus = function (text) {
            var el = document.getElementById("status");
            if (el) el.textContent = text;
        };
        window.__splashVersion = function (text) {
            var el = document.getElementById("version");
            if (el) el.textContent = text;
        };
    </script>
</body>
</html>
